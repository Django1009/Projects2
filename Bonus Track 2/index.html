<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="style.css">
<style>
canvas {
    border:1px solid #d3d3d3;
    background-color: #f1f1f1;
}
</style>
</head>
<body onload="startGame()">
<nav class="navigation">
  <button class="nav-button" onclick="window.location.href='index.html';">Mosquito</button>
  <button class="nav-button" onclick="window.location.href='index2.html';">Chess</button>
</nav>
<script>

var myGamePiece;
var myObstacles = [];
var myScore;
var keys = {};
var imageCache = {};
var useImages = false;

function getCSSSetting(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function loadImage(imageName) {
    if (imageCache[imageName]) {
        return imageCache[imageName];
    }
    var cssVar = '--' + imageName + '-image';
    var cssValue = getCSSSetting(cssVar);
    if (cssValue && cssValue !== '') {
        var url;
        // Extract URL from url() function
        if (cssValue.startsWith("url('")) {
            url = cssValue.slice(5, -2); // Remove url(' and ')
        } else if (cssValue.startsWith('url("')) {
            url = cssValue.slice(5, -2); // Remove url(" and ")
        } else if (cssValue.startsWith('url(')) {
            url = cssValue.slice(4, -1); // Remove url( and )
        } else {
            return null;
        }
        
        var img = new Image();
        img.onload = function() {
            // Once loaded, future renders will use this image
        };
        img.onerror = function() {
            console.error("Failed to load image: " + url);
        };
        img.src = url;
        imageCache[imageName] = img;
        return img;
    }
    return null;
}

function startGame() {
    useImages = getCSSSetting('--use-images') === 'true';
    myGamePiece = new component(30, 30, "red", 10, 120, undefined, "player");
    myGamePiece.gravity = 0.05;
    myScore = new component("30px", "Consolas", "black", 280, 40, "text");
    myGameArea.start();
    
    document.addEventListener('keydown', function(event) {
        keys[event.key] = true;
        if (['ArrowUp', 'ArrowLeft', 'ArrowRight', 'ArrowDown'].includes(event.key)) {
            event.preventDefault();
        }
    });
    
    document.addEventListener('keyup', function(event) {
        keys[event.key] = false;
    });
}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.canvas.width = 1000;
        this.canvas.height = 270;
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.frameNo = 0;
        // moderate game loop speed
        this.interval = setInterval(updateGameArea, 12);
        },
    clear : function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function component(width, height, color, x, y, type, imageName) {
    this.type = type;
    this.imageName = imageName;
    this.score = 0;
    this.width = width;
    this.height = height;
    this.speedX = 0;
    this.speedY = 0;    
    this.x = x;
    this.y = y;
    this.gravity = 0;
    this.gravitySpeed = 0;
    this.update = function() {
        ctx = myGameArea.context;
        if (this.type == "text") {
            ctx.font = this.width + " " + this.height;
            ctx.fillStyle = color;
            ctx.fillText(this.text, this.x, this.y);
        } else if (useImages && this.imageName) {
            var img = loadImage(this.imageName);
            if (img && img.complete && img.naturalHeight > 0) {
                ctx.drawImage(img, this.x, this.y, this.width, this.height);
            } else {
                ctx.fillStyle = color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        } else {
            ctx.fillStyle = color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
    this.newPos = function() {
        this.gravitySpeed += this.gravity;
        this.x += this.speedX;
        this.y += this.speedY + this.gravitySpeed;
        this.hitTop();
        this.hitBottom();
    }
    this.hitTop = function() {
        if (this.y < 0) {
            this.y = 0;
            this.gravitySpeed = 0;
        }
    }
    this.hitBottom = function() {
        var rockbottom = myGameArea.canvas.height - this.height;
        if (this.y > rockbottom) {
            this.y = rockbottom;
            this.gravitySpeed = 0;
        }
    }
    this.checkPlatformCollision = function() {
        for (var i = 0; i < myObstacles.length; i++) {
            var platform = myObstacles[i];
            var myVelocity = this.speedY + this.gravitySpeed;
            
            if (myVelocity >= 0 && 
                this.y + this.height <= platform.y + 5 &&
                this.y + this.height + myVelocity >= platform.y &&
                this.x + this.width > platform.x &&
                this.x < platform.x + platform.width) {
                
                this.y = platform.y - this.height;
                this.gravitySpeed = 0;
                return;
            }
        }
    }
    this.checkSideCollisions = function() {
        for (var i = 0; i < myObstacles.length; i++) {
            var platform = myObstacles[i];
            
            if (this.y + this.height > platform.y && this.y < platform.y + platform.height) {
                if (this.x + this.width > platform.x && this.x < platform.x + platform.width) {
                    var overlapLeft = this.x + this.width - platform.x;
                    var overlapRight = platform.x + platform.width - this.x;
                    
                    if (overlapLeft < overlapRight) {
                        this.x = platform.x - this.width;
                    } else {
                        this.x = platform.x + platform.width;
                    }
                    this.speedX = 0;
                    return;
                }
            }
        }
    }
    this.crashWith = function(otherobj) {
        var myleft = this.x;
        var myright = this.x + (this.width);
        var mytop = this.y;
        var mybottom = this.y + (this.height);
        var otherleft = otherobj.x;
        var otherright = otherobj.x + (otherobj.width);
        var othertop = otherobj.y;
        var otherbottom = otherobj.y + (otherobj.height);
        var crash = true;
        if ((mybottom < othertop) || (mytop > otherbottom) || (myright < otherleft) || (myleft > otherright)) {
            crash = false;
        }
        return crash;
    }
}

function updateGameArea() {
    var x, height, gap, minHeight, maxHeight, minGap, maxGap;
    
    if (keys['ArrowLeft']) {
        // moderate player horizontal movement
        myGamePiece.speedX = -4.5;
    } else if (keys['ArrowRight']) {
        myGamePiece.speedX = 4.5;
    } else {
        myGamePiece.speedX = 0;
    }
    
    if (keys['ArrowUp']) {
        myGamePiece.gravity = -0.3; // jump/ascend faster
    } else if (keys['ArrowDown']) {
        myGamePiece.gravity = 0.6; // fall faster when pressing down
    } else {
        myGamePiece.gravity = 0.05;
    }
    
    myGameArea.clear();
    myGameArea.frameNo += 1;
    if (myGameArea.frameNo == 1 || everyinterval(120)) {
        x = myGameArea.canvas.width;
        minHeight = 20;
        maxHeight = 200;
        height = Math.floor(Math.random()*(maxHeight-minHeight+1)+minHeight);
        // reduce vertical gap so obstacles are closer together
        minGap = 30;
        maxGap = 100;
        gap = Math.floor(Math.random()*(maxGap-minGap+1)+minGap);
        myObstacles.push(new component(60, height, "green", x, 0, undefined, "platform"));
        myObstacles.push(new component(60, x - height - gap, "green", x, height + gap, undefined, "platform"));
    }
    for (i = 0; i < myObstacles.length; i += 1) {
        // moderate obstacle speed
        myObstacles[i].x += -5.5;
        myObstacles[i].update();
    }
    myScore.text="SCORE: " + myGameArea.frameNo;
    myScore.update();
    myGamePiece.newPos();
    myGamePiece.checkPlatformCollision();
    myGamePiece.checkSideCollisions();
    myGamePiece.update();
}

function everyinterval(n) {
    if ((myGameArea.frameNo / n) % 1 == 0) {return true;}
    return false;
}

</script>
<p>Use arrows to move. If you are pushed offscreen, reload the page.</p>
</body>
</html>
